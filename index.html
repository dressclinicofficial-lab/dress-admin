<!DOCTYPE html>
<html lang="ko">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

  body{font-family:'Noto Sans KR',sans-serif;background:#FBF7F7}
  input,button,textarea{font-family:inherit}
</style>
<!-- React -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

</head>
<body>
<div id="root"></div>

<script>
/* ════════════════════════════════════════════════════
   ✅ Firebase 설정 완료 (dress-clinic-3216f / dressclinic.official 계정)
   설정을 변경하려면 Firebase 콘솔 → 프로젝트 설정에서 확인
   ════════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyCPORYUoTEoz7vQR5XTEAjr1T8QDBkisJo",
  authDomain: "dress-clinic-3216f.firebaseapp.com",
  projectId: "dress-clinic-3216f",
  storageBucket: "dress-clinic-3216f.firebasestorage.app",
  messagingSenderId: "432660211781",
  appId: "1:432660211781:web:40c9f8df06ff11bf86db2c"
};
/* ════════════════════════════════════════════════════ */

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 환자 데이터 함수 (Firestore: 환자 1명 = 문서 1개)
async function loadPatients(){
  const snap = await db.collection("patients").orderBy("submittedAt","desc").get();
  return snap.docs.map(d => d.data());
}
async function savePatient(record){
  await db.collection("patients").doc(record.id).set(record);
}
async function deletePatient(id){
  await db.collection("patients").doc(id).delete();
}
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const C = {
  rose:"#C8919A",roseLt:"#F5E8EA",roseDk:"#9E6069",
  ink:"#2B2224",inkMd:"#6B5457",inkLt:"#A89496",
  bg:"#FBF7F7",white:"#FFFFFF",border:"#E8D9DB",
};
const inp={width:"100%",padding:"10px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontFamily:"inherit",fontSize:14,color:C.ink,background:C.white,outline:"none",boxSizing:"border-box"};
const chip=(on)=>({padding:"7px 13px",border:`1.5px solid ${on?C.rose:C.border}`,borderRadius:20,fontSize:13,color:on?C.white:C.inkMd,background:on?C.rose:C.white,cursor:"pointer",fontWeight:on?700:400,userSelect:"none"});
const btnS=(bg,col="#fff")=>({padding:"13px 0",border:"none",borderRadius:10,fontFamily:"inherit",fontSize:15,fontWeight:700,cursor:"pointer",background:bg,color:col,width:"100%"});
const cardS={background:C.white,borderRadius:12,boxShadow:"0 2px 12px rgba(43,34,36,.08)",padding:"18px 16px",marginBottom:14};
const ADMIN_PW="dress2024";

const CardTitle=({t})=>(
  <div style={{fontSize:13,fontWeight:700,color:C.roseDk,marginBottom:14,display:"flex",alignItems:"center",gap:7}}>
    <span style={{width:3,height:16,background:C.rose,borderRadius:2,display:"inline-block",flexShrink:0}}/>
    {t}
  </div>
);
const Field=({label,req,children})=>(
  <div style={{marginBottom:13}}>
    <label style={{display:"block",fontSize:12,fontWeight:600,color:C.inkMd,marginBottom:4}}>
      {label}{req&&<span style={{color:C.rose}}> *</span>}
    </label>
    {children}
  </div>
);
const ChipGroup=({children})=><div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:4}}>{children}</div>;
const Chip=({label,on,onClick})=><button onClick={onClick} style={chip(on)}>{label}</button>;

function toggleChip(list,setList,val,noneVal="없음"){
  if(val===noneVal){setList([noneVal]);return;}
  setList(prev=>prev.includes(val)?prev.filter(v=>v!==val):[...prev.filter(v=>v!==noneVal),val]);
}

// ── 환자 접수 폼 ─────────────────────────────────────
function PatientForm({onSubmitDone,onLogoTap}){
  const [page,setPage]=useState(1);
  const TOTAL=3;
  const [apptDate,setApptDate]=useState("");
  const [apptTime,setApptTime]=useState("");
  const [route,setRoute]=useState("");
  const [routeNick,setRouteNick]=useState("");
  const [routeCafeName,setRouteCafeName]=useState("");
  const [routeRef,setRouteRef]=useState({name:"",phone:""});
  const [consultField,setConsultField]=useState([]);
  const [eyeType,setEyeType]=useState("");
  const [eyeTiming,setEyeTiming]=useState("");
  const [eyeTimingEtc,setEyeTimingEtc]=useState("");
  const [fillerParts,setFillerParts]=useState([]);
  const [experience,setExperience]=useState([]);
  const [expFillerEtc,setExpFillerEtc]=useState("");
  const [expEtc,setExpEtc]=useState("");
  const [symptom,setSymptom]=useState([]);
  const [symptomEtc,setSymptomEtc]=useState("");
  const [name,setName]=useState("");
  const [ssn,setSsn]=useState("");
  const [phone,setPhone]=useState("");
  const [guardianPhone,setGuardianPhone]=useState("");
  const [addrSi,setAddrSi]=useState("");
  const [addrGu,setAddrGu]=useState("");
  const [addrDong,setAddrDong]=useState("");
  const [addrDetail,setAddrDetail]=useState("");
  const [diseases,setDiseases]=useState([]);
  const [diseaseEtc,setDiseaseEtc]=useState("");
  const [meds,setMeds]=useState([]);
  const [medName,setMedName]=useState("");
  const [medReason,setMedReason]=useState("");
  const [allergy,setAllergy]=useState([]);
  const [allergyEtc,setAllergyEtc]=useState("");
  const [agreePrivacy,setAgreePrivacy]=useState(false);
  const [agreeCCTV,setAgreeCCTV]=useState(false);
  const [signName,setSignName]=useState("");
  const canvasRef=useRef(null);
  const drawing=useRef(false);
  const last=useRef({x:0,y:0});

  useEffect(()=>{
    if(page!==3)return;
    const cv=canvasRef.current;if(!cv)return;
    const resize=()=>{
      const r=cv.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
      cv.width=r.width*dpr;cv.height=r.height*dpr;
      const ctx=cv.getContext("2d");
      ctx.scale(dpr,dpr);ctx.strokeStyle=C.ink;ctx.lineWidth=2.5;ctx.lineCap="round";ctx.lineJoin="round";
    };
    setTimeout(resize,80);
    window.addEventListener("resize",resize);
    return()=>window.removeEventListener("resize",resize);
  },[page]);

  const getPos=(e,cv)=>{const r=cv.getBoundingClientRect(),src=e.touches?e.touches[0]:e;return{x:src.clientX-r.left,y:src.clientY-r.top};};
  const onDown=(e)=>{drawing.current=true;last.current=getPos(e,canvasRef.current);};
  const onMove=(e)=>{if(!drawing.current)return;e.preventDefault();const cv=canvasRef.current,ctx=cv.getContext("2d"),p=getPos(e,cv);ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);ctx.stroke();last.current=p;};
  const onUp=()=>{drawing.current=false;};
  const clearSig=()=>{const cv=canvasRef.current;cv.getContext("2d").clearRect(0,0,cv.width,cv.height);};
  const ssnFmt=(v)=>{const d=v.replace(/\D/g,"").slice(0,7);return d.length>6?d.slice(0,6)+"-"+d.slice(6,7):d;};

  const validate=(p)=>{
    if(p===1){if(!apptDate){alert("예약 날짜를 선택해 주세요.");return false;}if(!apptTime){alert("예약 시간을 선택해 주세요.");return false;}}
    if(p===2){if(!name.trim()){alert("성명을 입력해 주세요.");return false;}if(!phone.trim()){alert("연락처를 입력해 주세요.");return false;}}
    if(p===3){if(!agreePrivacy){alert("개인정보 동의는 필수입니다.");return false;}if(!agreeCCTV){alert("CCTV 동의는 필수입니다.");return false;}}
    return true;
  };
  const goPage=(dir)=>{if(dir===1&&!validate(page))return;setPage(p=>Math.max(1,Math.min(TOTAL,p+dir)));window.scrollTo(0,0);};

  const handleSubmit=async()=>{
    if(!validate(3))return;
    const sig=canvasRef.current?canvasRef.current.toDataURL():"";
    const consultFieldText=consultField.map(f=>{
      if(f==="눈수술")return `눈수술${eyeType?`(${eyeType})`:""}`;
      if(f==="필러")return `필러${fillerParts.length?`(${fillerParts.join("/")})`:""}`;
      return f;
    }).join(", ");
    const eyeTimingText=consultField.includes("눈수술")?(eyeTiming==="기타"?`기타(${eyeTimingEtc})`:eyeTiming):"";
    const experienceText=experience.map(v=>{
      if(v==="필러")return `필러${expFillerEtc?`(${expFillerEtc})`:""}`;
      if(v==="기타")return `기타${expEtc?`(${expEtc})`:""}`;
      return v;
    }).join(", ");
    const symptomText=symptom.map(v=>v==="기타"?`기타${symptomEtc?`(${symptomEtc})`:""}`:v).join(", ");
    const record={
      id:Date.now().toString(),submittedAt:new Date().toISOString(),
      apptDate,apptTime,route,routeNick,routeCafeName,
      routeRefName:routeRef.name,routeRefPhone:routeRef.phone,
      consultField:consultFieldText,eyeTiming:eyeTimingText,
      experience:experienceText,symptom:symptomText,
      name,ssn,phone,guardianPhone,address:[addrSi,addrGu,addrDong,addrDetail].filter(Boolean).join(" "),
      diseases:diseases.join(", ")+(diseases.includes("기타")?` (${diseaseEtc})`:""),
      meds:meds.join(", ")+(meds.includes("기타")?` [${medName} / ${medReason}]`:""),
      allergy:allergy.join(", ")+(allergy.includes("기타")?` (${allergyEtc})`:""),
      agreePrivacy,agreeCCTV,signName,sig,
    };
    try{
      await savePatient(record);
      onSubmitDone(record);
    }catch(e){alert("저장 중 오류가 발생했습니다. 인터넷 연결을 확인해 주세요.");}
  };

  const pct=((page-1)/(TOTAL-1))*100;
  const AgreeRow=({checked,onChange,label})=>(
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,cursor:"pointer"}} onClick={onChange}>
      <div style={{width:22,height:22,border:`2px solid ${checked?C.rose:C.border}`,borderRadius:6,background:checked?C.rose:C.white,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        {checked&&<span style={{color:"#fff",fontSize:13,fontWeight:700}}>✓</span>}
      </div>
      <span style={{fontSize:14,color:C.ink,fontWeight:500}}>{label}</span>
    </div>
  );
  const AgreeTxt=({children})=>(
    <div style={{background:C.roseLt,border:`1px solid ${C.rose}`,borderRadius:10,padding:14,fontSize:12,lineHeight:1.75,color:C.inkMd,marginBottom:14,maxHeight:150,overflowY:"auto"}}>{children}</div>
  );

  return(
    <div style={{fontFamily:"'Noto Sans KR',sans-serif",background:C.bg,minHeight:"100vh",paddingBottom:80}}>
      <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"18px 20px 14px",textAlign:"center",position:"sticky",top:0,zIndex:100}}>
        <div onClick={onLogoTap} style={{fontSize:11,letterSpacing:".18em",color:C.rose,textTransform:"uppercase",marginBottom:4,userSelect:"none"}}>DRESS Plastic Surgery</div>
        <div style={{fontSize:18,fontWeight:700,color:C.ink}}>사전 접수 차트</div>
        <div style={{fontSize:12,color:C.inkLt,marginTop:3}}>내원 전 미리 작성해 주세요</div>
      </div>
      <div style={{background:C.white,padding:"12px 20px 14px",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",position:"relative",marginBottom:6}}>
          <div style={{position:"absolute",top:"50%",left:0,right:0,height:2,background:C.border,transform:"translateY(-50%)",zIndex:0}}/>
          <div style={{position:"absolute",top:"50%",left:0,height:2,background:C.rose,transform:"translateY(-50%)",zIndex:1,width:`${pct}%`,transition:"width .4s"}}/>
          {[1,2,3].map(i=>(
            <div key={i} style={{width:28,height:28,borderRadius:"50%",background:i<page?C.roseDk:i===page?C.rose:C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:i<=page?"#fff":C.inkLt,position:"relative",zIndex:2}}>{i}</div>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.inkLt}}>
          {["예약정보","기본정보","동의서"].map(l=><span key={l}>{l}</span>)}
        </div>
      </div>

      <div style={{padding:"16px 16px 0"}}>
        {page===1&&<>
          <div style={cardS}>
            <CardTitle t="예약 일정"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Field label="예약 날짜" req><input type="date" style={inp} value={apptDate} onChange={e=>setApptDate(e.target.value)}/></Field>
              <Field label="예약 시간" req><input type="time" style={inp} value={apptTime} onChange={e=>setApptTime(e.target.value)}/></Field>
            </div>
          </div>
          <div style={cardS}>
            <CardTitle t="방문 경로"/>
            <ChipGroup>
              {["SNS(인스타/페이스북)","네이버 카페","바비톡","강남언니","구환 소개"].map(v=>(
                <Chip key={v} label={v} on={route===v} onClick={()=>{setRoute(v);setRouteNick("");setRouteCafeName("");setRouteRef({name:"",phone:""});}}/>
              ))}
            </ChipGroup>
            {route==="네이버 카페"&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
                <input style={inp} placeholder="카페 이름 (예: 성형정보카페)" value={routeCafeName} onChange={e=>setRouteCafeName(e.target.value)}/>
                <input style={inp} placeholder="카페 닉네임" value={routeNick} onChange={e=>setRouteNick(e.target.value)}/>
              </div>
            )}
            {(route==="바비톡"||route==="강남언니")&&(
              <input style={{...inp,marginTop:10}} placeholder={`${route} 닉네임`} value={routeNick} onChange={e=>setRouteNick(e.target.value)}/>
            )}
            {route==="구환 소개"&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
                <input style={inp} placeholder="소개자 이름" value={routeRef.name} onChange={e=>setRouteRef(r=>({...r,name:e.target.value}))}/>
                <input style={inp} placeholder="소개자 연락처" value={routeRef.phone} onChange={e=>setRouteRef(r=>({...r,phone:e.target.value}))}/>
              </div>
            )}
          </div>

          <div style={cardS}>
            <CardTitle t="상담 희망 정보"/>
            <Field label="상담을 원하는 분야 (중복 선택 가능)">
              <ChipGroup>{["눈수술","필러","윤곽주사","보톡스","리프팅","스킨부스터"].map(v=>(
                <Chip key={v} label={v} on={consultField.includes(v)} onClick={()=>toggleChip(consultField,setConsultField,v)}/>
              ))}</ChipGroup>
            </Field>

            {consultField.includes("눈수술")&&(
              <>
                <Field label="눈수술 구분">
                  <ChipGroup>{["첫수술","재수술"].map(v=>(
                    <Chip key={v} label={v} on={eyeType===v} onClick={()=>setEyeType(eyeType===v?"":v)}/>
                  ))}</ChipGroup>
                </Field>
                <Field label="눈수술 희망 시기">
                  <ChipGroup>{["일주일 이내","한 달 이내","3개월 이내","기타"].map(v=>(
                    <Chip key={v} label={v} on={eyeTiming===v} onClick={()=>setEyeTiming(eyeTiming===v?"":v)}/>
                  ))}</ChipGroup>
                  {eyeTiming==="기타"&&<input style={{...inp,marginTop:10}} placeholder="희망 시기 입력" value={eyeTimingEtc} onChange={e=>setEyeTimingEtc(e.target.value)}/>}
                </Field>
              </>
            )}

            {consultField.includes("필러")&&(
              <Field label="필러 희망 부위 (중복 선택 가능)">
                <ChipGroup>{["이마","코","앞볼","팔자","옆볼","턱끝","애교","다크써클","입술"].map(v=>(
                  <Chip key={v} label={v} on={fillerParts.includes(v)} onClick={()=>toggleChip(fillerParts,setFillerParts,v)}/>
                ))}</ChipGroup>
              </Field>
            )}

            <div style={{height:1,background:C.border,margin:"12px 0"}}/>

            <Field label="이전 시술/수술 경험 (중복 선택 가능)">
              <ChipGroup>{["눈","코","실리프팅","지방이식","가슴수술","윤곽주사","필러","스킨부스터","기타"].map(v=>(
                <Chip key={v} label={v} on={experience.includes(v)} onClick={()=>toggleChip(experience,setExperience,v)}/>
              ))}</ChipGroup>
              {experience.includes("필러")&&<input style={{...inp,marginTop:10}} placeholder="필러 시술 부위/시기" value={expFillerEtc} onChange={e=>setExpFillerEtc(e.target.value)}/>}
              {experience.includes("기타")&&<input style={{...inp,marginTop:10}} placeholder="기타 경험 입력" value={expEtc} onChange={e=>setExpEtc(e.target.value)}/>}
            </Field>

            <div style={{height:1,background:C.border,margin:"12px 0"}}/>

            <Field label="이전 시술/수술 시 이상 증상">
              <ChipGroup>{["없음","저혈압 또는 실신","마취가 잘 안되거나 쉽게 풀림","기타"].map(v=>(
                <Chip key={v} label={v} on={symptom.includes(v)} onClick={()=>toggleChip(symptom,setSymptom,v)}/>
              ))}</ChipGroup>
              {symptom.includes("기타")&&<input style={{...inp,marginTop:10}} placeholder="증상 입력" value={symptomEtc} onChange={e=>setSymptomEtc(e.target.value)}/>}
            </Field>
          </div>
        </>}

        {page===2&&<>
          <div style={cardS}>
            <CardTitle t="환자 정보"/>
            <Field label="성명" req><input style={inp} placeholder="홍길동" value={name} onChange={e=>setName(e.target.value)}/></Field>
            <Field label="주민등록번호" req>
              <input style={inp} placeholder="000000-0" value={ssn} onChange={e=>setSsn(ssnFmt(e.target.value))} maxLength={8}/>
              <div style={{fontSize:11,color:C.inkLt,marginTop:4}}>* 뒷자리는 첫 번째 숫자만 입력해 주세요 (개인정보 보호)</div>
            </Field>
            <Field label="연락처" req><input style={inp} placeholder="010-0000-0000" value={phone} onChange={e=>setPhone(e.target.value)}/></Field>
            <Field label="보호자 연락처"><input style={inp} placeholder="010-0000-0000" value={guardianPhone} onChange={e=>setGuardianPhone(e.target.value)}/></Field>
            <Field label="주소" req>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
                <input style={inp} placeholder="시" value={addrSi} onChange={e=>setAddrSi(e.target.value)}/>
                <input style={inp} placeholder="구" value={addrGu} onChange={e=>setAddrGu(e.target.value)}/>
                <input style={inp} placeholder="동" value={addrDong} onChange={e=>setAddrDong(e.target.value)}/>
              </div>
              <input style={inp} placeholder="상세 주소 (건물명, 동/호수 등)" value={addrDetail} onChange={e=>setAddrDetail(e.target.value)}/>
            </Field>
          </div>
          <div style={cardS}>
            <CardTitle t="지병 / 복용약"/>
            <Field label="현재 앓고 있는 지병">
              <ChipGroup>{["없음","저/고혈압","당뇨","기관지천식","심장질환","갑상선질환","위염/위궤양","결핵","간염","정신질환","기타"].map(v=>(
                <Chip key={v} label={v} on={diseases.includes(v)} onClick={()=>toggleChip(diseases,setDiseases,v)}/>
              ))}</ChipGroup>
              {diseases.includes("기타")&&<input style={{...inp,marginTop:10}} placeholder="기타 지병 입력" value={diseaseEtc} onChange={e=>setDiseaseEtc(e.target.value)}/>}
            </Field>
            <div style={{height:1,background:C.border,margin:"12px 0"}}/>
            <Field label="복용 중인 약">
              <ChipGroup>{["없음","혈압약","당뇨약","아스피린/아피린","건강보조제/비타민","기타"].map(v=>(
                <Chip key={v} label={v} on={meds.includes(v)} onClick={()=>toggleChip(meds,setMeds,v)}/>

// ── 완료 화면 ────────────────────────────────────────
function SuccessScreen({record}){
  const qrRef=useRef(null);
  const [qrFailed,setQrFailed]=useState(false);
  const dt=record.apptDate&&record.apptTime
    ?new Date(record.apptDate+"T"+record.apptTime).toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"short"})+" "+record.apptTime
    :"";

  useEffect(()=>{
    let cancelled=false;
    const render=async()=>{
      try{
        if(!window.QRCode){
          await new Promise((res,rej)=>{
            const sc=document.createElement("script");
            sc.src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";
            sc.onload=res;sc.onerror=rej;
            document.head.appendChild(sc);
          });
        }
        if(cancelled||!qrRef.current)return;
        qrRef.current.innerHTML="";
        new window.QRCode(qrRef.current,{text:record.id,width:170,height:170,colorDark:"#2B2224",colorLight:"#ffffff"});
      }catch(e){ if(!cancelled) setQrFailed(true); }
    };
    render();
    return()=>{cancelled=true;};
  },[record]);

  return(
    <div style={{fontFamily:"'Noto Sans KR',sans-serif",background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center",padding:"0 24px"}}>
        <div style={{fontSize:60,marginBottom:16}}>🌸</div>
        <div style={{fontSize:22,fontWeight:700,color:C.roseDk,marginBottom:8}}>접수가 완료되었습니다</div>
        <div style={{fontSize:14,color:C.inkMd,lineHeight:1.8}}>
          소중한 방문 감사드립니다.<br/>내원 시 접수처에 성함을 말씀해 주세요.<br/><br/>
          {dt&&<span style={{color:C.roseDk,fontWeight:700}}>{dt} 예약 확정</span>}
        </div>
        <div style={{marginTop:24,background:C.white,borderRadius:16,padding:20,boxShadow:"0 2px 12px rgba(43,34,36,.08)",display:"inline-block"}}>
          <div style={{fontSize:12,fontWeight:700,color:C.roseDk,marginBottom:12}}>내원 시 이 QR코드를 보여주세요</div>
          {!qrFailed
            ?<div ref={qrRef} style={{width:170,height:170,margin:"0 auto"}}/>
            :<div style={{width:170,height:170,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:C.inkLt,border:`1px dashed ${C.border}`,borderRadius:8}}>QR 생성 실패<br/>아래 코드로 확인 가능</div>
          }
          <div style={{fontSize:11,color:C.inkLt,marginTop:10}}>확인 코드</div>
          <div style={{fontSize:13,fontWeight:700,color:C.ink,letterSpacing:".02em"}}>{record.id}</div>
        </div>
      </div>
    </div>
  );
}

function A4Chart({p,onBack,onDelete}){
  const chartRef=useRef(null);
  const [saving,setSaving]=useState(false);

  const fmtDt=(iso)=>iso?new Date(iso).toLocaleString("ko-KR",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}):"-";
  const routeLabel=[p.route,p.routeCafeName&&`- ${p.routeCafeName}`,p.routeNick&&`(${p.routeNick})`,p.routeRefName&&`— ${p.routeRefName} ${p.routeRefPhone}`].filter(Boolean).join(" ");

  const saveImage=async()=>{
    setSaving(true);
    try{
      if(!window.html2canvas){
        await new Promise((res,rej)=>{
          const sc=document.createElement("script");
          sc.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
          sc.onload=res;sc.onerror=rej;
          document.head.appendChild(sc);
        });
      }
      const canvas=await window.html2canvas(chartRef.current,{scale:2,useCORS:true,backgroundColor:"#ffffff"});
      const fileName=`접수차트_${p.name}_${p.apptDate}.png`;
      const link=document.createElement("a");
      link.download=fileName;
      link.href=canvas.toDataURL("image/png");
      link.click();
    }catch(e){alert("이미지 저장 중 오류가 발생했습니다.");}
    setSaving(false);
  };

  const SEC={background:C.roseDk,color:"#fff",fontSize:11,fontWeight:700,padding:"6px 12px",letterSpacing:".06em",border:`1px solid ${C.roseDk}`};

  return(
    <div style={{fontFamily:"'Noto Sans KR',sans-serif",background:"#c8c8c8",minHeight:"100vh",paddingBottom:40}}>

          {saving?"저장 중...":"📥 이미지 저장"}
        </button>
        <button onClick={()=>onDelete(p.id)} style={{background:"none",border:`1px solid ${C.rose}`,borderRadius:8,padding:"8px 12px",fontSize:13,color:C.rose,cursor:"pointer",fontFamily:"inherit"}}>삭제</button>
      </div>

          </div>
        </div>

        <table style={{width:"100%",borderCollapse:"collapse",marginBottom:18}}>

            <tr><td colSpan={4} style={SEC}>▸ 예약 정보</td></tr>

            {/* 동의 */}

        </div>
      </div>
    </div>
  );

function AdminDashboard({onLogout}){
  const [patients,setPatients]=useState([]);

    setLoading(true);
    try{setPatients(await loadPatients());}
    catch(_){setPatients([]);}
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const handleDelete=async(id)=>{
    if(!confirm("이 접수 기록을 삭제하시겠습니까?"))return;
    const next=patients.filter(p=>p.id!==id);
    await deletePatient(id);
    setPatients(next);
    setSelected(null);
  };

  const filtered=patients.filter(p=>{
    const q=search.trim().toLowerCase();
    return(!q||p.name?.includes(q)||p.phone?.includes(q))&&(!dateFilter||p.apptDate===dateFilter);
  });
  const today=new Date().toISOString().slice(0,10);

  if(selected) return <A4Chart p={selected} onBack={()=>setSelected(null)} onDelete={handleDelete}/>;

  return(
    <div style={{fontFamily:"'Noto Sans KR',sans-serif",background:C.bg,minHeight:"100vh",paddingBottom:20}}>
      <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"12px 16px",display:"flex",alignItems:"center",position:"sticky",top:0,zIndex:100}}>

          <div style={{fontSize:16,fontWeight:700,color:C.ink}}>접수 관리</div>

        <div style={{marginLeft:"auto",display:"flex",gap:8}}>
          <button onClick={load} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 12px",fontSize:12,color:C.inkMd,cursor:"pointer",fontFamily:"inherit"}}>새로고침</button>
          <button onClick={onLogout} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 12px",fontSize:12,color:C.inkMd,cursor:"pointer",fontFamily:"inherit"}}>로그아웃</button>
        </div>
      </div>
      <div style={{background:C.white,padding:"10px 16px",borderBottom:`1px solid ${C.border}`}}>

      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,padding:"12px 16px"}}>
        {[["전체 접수",patients.length],["오늘 예약",patients.filter(p=>p.apptDate===today).length]].map(([label,count])=>(
          <div key={label} style={{...cardS,marginBottom:0,textAlign:"center",padding:"14px 10px"}}>
            <div style={{fontSize:26,fontWeight:700,color:C.rose}}>{count}</div>
            <div style={{fontSize:12,color:C.inkLt,marginTop:2}}>{label}</div>
          </div>
        ))}
      </div>
      <div style={{padding:"0 16px"}}>
        {loading
          ?<div style={{textAlign:"center",padding:40,color:C.inkLt}}>불러오는 중...</div>
          :filtered.length===0
            ?<div style={{textAlign:"center",padding:40,color:C.inkLt}}>접수 기록이 없습니다.</div>
            :filtered.map(p=>(
              <div key={p.id} onClick={()=>setSelected(p)}
                style={{...cardS,cursor:"pointer",display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                <div style={{width:42,height:42,borderRadius:"50%",background:C.roseLt,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:700,color:C.roseDk,flexShrink:0}}>
                  {p.name?.[0]||"?"}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,color:C.ink,fontSize:15}}>{p.name}</div>
                  <div style={{fontSize:12,color:C.inkLt,marginTop:2}}>{p.phone} · {p.route||"—"}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:C.roseDk}}>{p.apptDate}</div>
                  <div style={{fontSize:11,color:C.inkLt}}>{p.apptTime}</div>
                </div>
                <span style={{color:C.inkLt,fontSize:20}}>›</span>
              </div>
            ))
        }
      </div>
    </div>
  );
}

// ── 앱 루트 ─────────────────────────────────────────
function App(){
  const [mode,setMode]=useState("patient");
  const [doneRecord,setDoneRecord]=useState(null);
  const [adminAuthed,setAdminAuthed]=useState(false);
  const [tapCount,setTapCount]=useState(0);
  const tapTimer=useRef(null);

  const handleLogoTap=()=>{
    const next=tapCount+1;
    setTapCount(next);
    clearTimeout(tapTimer.current);
    if(next>=5){setTapCount(0);setMode(adminAuthed?"admin":"adminLogin");}
    else{tapTimer.current=setTimeout(()=>setTapCount(0),2000);}
  };

  if(mode==="patient") return <PatientForm onSubmitDone={r=>{setDoneRecord(r);setMode("success");}} onLogoTap={handleLogoTap}/>;
  if(mode==="success") return <SuccessScreen record={doneRecord}/>;
  if(mode==="adminLogin") return <AdminLogin onLogin={()=>{setAdminAuthed(true);setMode("admin");}} onCancel={()=>setMode("patient")}/>;
  if(mode==="admin") return <AdminDashboard onLogout={()=>{setAdminAuthed(false);setMode("patient");}}/>;
  return null;
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
